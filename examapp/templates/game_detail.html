{% extends 'base.html' %}

{% block content %}
  <h2>{{ game.name }}</h2>
  <p>Description: {{ game.description }}</p>
  <p>Platform: {{ game.platform }}</p>
  <p>Genre: {{ game.genre }}</p>
  <p>Price: ${{ game.price }}</p>
  <p>Stock: {{ game.stock }}</p>
  <a href="{% url 'add_to_cart' game.id %}">Add to Cart</a>
{% endblock %}
